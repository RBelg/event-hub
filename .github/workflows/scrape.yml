name: Scrape events

# 日次でイベントを集約し events.json を更新して GitHub Pages へ公開する。
on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST (= 21:00 UTC)
  workflow_dispatch: {}     # 手動実行も可

permissions:
  contents: write           # events.json をコミットするため

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run scraper
        env:
          # connpass を含めたい場合は Settings > Secrets に登録（任意）
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
        run: python scraper/scrape.py

      - name: Commit updated events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # events.json は毎回生成し直す成果物。マージせず「今の生成物で上書き」する。
          cp events.json /tmp/events.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main          # リモート最新に合わせる
            cp /tmp/events.json events.json        # 今回生成した内容で上書き
            if [ -z "$(git status --porcelain events.json)" ]; then
              echo "No changes to events.json"; exit 0
            fi
            git add events.json
            git commit -m "chore: update events.json ($(date -u +%FT%TZ))"
            if git push; then exit 0; fi
            echo "push retry $i ..."; sleep 5
          done
          echo "push failed after retries"; exit 1
