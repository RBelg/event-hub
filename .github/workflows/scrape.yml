name: Scrape events

# 日次でイベントを集約し events.json を更新して GitHub Pages へ公開する。
on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST (= 21:00 UTC)
  workflow_dispatch: {}     # 手動実行も可

permissions:
  contents: write           # events.json をコミットするため

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        env:
          # connpass を含めたい場合は Settings > Secrets に登録（任意）
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
        run: python scraper/scrape.py

      - name: Commit updated events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain events.json)" ]; then
            git add events.json
            git commit -m "chore: update events.json ($(date -u +%FT%TZ))"
            git push
          else
            echo "No changes to events.json"
          fi
